services:
  science-rag-assistant:
    build: .
    container_name: science-rag-assistant
    ports:
      - "8501:8501"
    environment:
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_PROJECT_ID=${YANDEX_PROJECT_ID}
      - PROMPT_ID=${PROMPT_ID}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s